name: Canary Release

on:
  push:
    branches: [main]

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary:
    name: Build & test canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:all
