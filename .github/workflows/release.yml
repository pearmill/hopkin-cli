name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: ci
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      # Verify version in package.json matches the git tag
      - name: Verify version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Prepare skill artifact
        run: cp dist/hopkin-cli.skill hopkin-cli.skill

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            # First release — log from initial commit
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $GITHUB_REF_NAME)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${GITHUB_REF_NAME})
          fi

          # Write to file to avoid delimiter issues
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY="## Install

          \`\`\`bash
          npm install -g @hopkin/cli@${VERSION}
          \`\`\`

          ## Claude Code Skill

          Download \`hopkin-cli.skill\` and add it to your project:

          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/hopkin-cli.skill -o .claude/skills/hopkin-cli.skill
          \`\`\`

          Or install via the CLI:

          \`\`\`bash
          hopkin skill install
          \`\`\`

          ## Changes

          $(cat /tmp/changelog.txt)

          ---
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git tag --sort=-version:refname | head -2 | tail -1)...$GITHUB_REF_NAME"

          gh release create "$GITHUB_REF_NAME" \
            --title "v${VERSION}" \
            --notes "$BODY" \
            --verify-tag \
            hopkin-cli.skill
